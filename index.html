let idx = keys.length - 1;

const picker = document.getElementById('datePicker');
keys.forEach((k, i) => {
  const opt = document.createElement('option');
  opt.value = i;
  opt.textContent = k;
  picker.appendChild(opt);
});
picker.value = idx;

function pickDate(i) {
  idx = parseInt(i);
  render();
}

function nav(d) {
  idx = Math.max(0, Math.min(keys.length-1, idx+d));
  picker.value = idx;
  render();
}

function render() {
  const dt = keys[idx], items = DATA[dt];
  document.getElementById('prevBtn').disabled = (idx===0);
  document.getElementById('nextBtn').disabled = (idx===keys.length-1);
  document.getElementById('lu').textContent = keys[keys.length-1];
  document.getElementById('dateInfo').textContent = (idx+1)+'/'+keys.length+' 个交易日';

  const totalAmt = items.reduce((s,x) => s+x.amount_yi, 0);

    const cc = s.chg_pct>=0 ? 'chg-up' : 'chg-down';
    const cs = (s.chg_pct>=0?'+':'')+s.chg_pct.toFixed(2)+'%';

}
